<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Grand Essence</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-slider">
        <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=1600')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=1600')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1600')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=1600')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=1600')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1551882547-ff43c63efe5c?w=1600')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1535827841776-24afc1e255ac?w=1600')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1564501049412-61c2a3083791?w=1600')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1544124499-58912cbddaad?w=1600')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=1600')"></div>
    </div>

    <div class="login-overlay">
        <div class="login-card">
            <div class="brand-header">
                <h1 class="logo">GRAND ESSENCE</h1>
                <p>MEMBER EXCLUSIVE ACCESS</p>
            </div>

            <form id="loginForm">
                <div class="input-box">
                    <input type="email" required>
                    <label>Email Address</label>
                </div>
                <div class="input-box">
                    <input type="password" required>
                    <label>Password</label>
                </div>

                <div class="form-actions">
                    <label><input type="checkbox"> Remember Me</label>
                    <a href="#">Forgot Credentials?</a>
                </div>

                <button type="submit" class="login-btn">ENTER THE GRANDeur</button>
            </form>

            <div class="login-footer">
                <p>Not a member yet? <a href="signup.html">JOIN THE CLUB</a></p>
                <a href="index.html" class="back-home">← Return to Sanctuary</a>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
