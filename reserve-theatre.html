<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Theater Reservation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="reserve-theatre.css">
</head>
<body>

    <nav class="top-nav">
        <a href="index.html" class="home-link">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </nav>

    <div class="theater-container">
        <header>
            <h1>Reserve The Royal Cinema</h1>
            <p>Private Screening & Premium Experience</p>
        </header>

        <ul class="showcase">
            <li><div class="seat"></div> <small>Available</small></li>
            <li><div class="seat selected"></div> <small>Selected</small></li>
            <li><div class="seat occupied"></div> <small>Occupied</small></li>
        </ul>

        <div class="container">
            <div class="screen"></div>
            <div class="row">
                <div class="seat"></div><div class="seat"></div><div class="seat"></div><div class="seat"></div><div class="seat"></div><div class="seat"></div>
            </div>
            <div class="row">
                <div class="seat"></div><div class="seat"></div><div class="seat occupied"></div><div class="seat occupied"></div><div class="seat"></div><div class="seat"></div>
            </div>
            <div class="row">
                <div class="seat"></div><div class="seat"></div><div class="seat"></div><div class="seat"></div><div class="seat occupied"></div><div class="seat"></div>
            </div>
        </div>

        <div class="booking-details">
            <p class="text">
                Selected Seats: <span id="count">0</span> | Total: ₹<span id="total">0</span>
            </p>
            
            <form id="reservationForm">
                <input type="text" id="custName" placeholder="Your Name" required>
                <input type="email" id="custEmail" placeholder="Your Email" required>
                <button type="submit" class="confirm-btn">Confirm Reservation</button>
            </form>
        </div>
    </div>

    <script src="reserve-theatre.js"></script>
</body>
</html>
