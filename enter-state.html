<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter The Estate | Grand Essence</title>
    <link rel="stylesheet" href="enter-state.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="entrance-wrapper">

            <div class="button-wrap">
                <a href="index.html" class="enter-link" id="gateBtn">
                    <span class="circle"></span>

            </div>
        </div>

    <audio id="gateSound" src="https://www.soundjay.com/door/sounds/door-latch-1.mp3"></audio>

    <script src="enter-state.js"></script>
